<style>
/* Loader circulaire fluide pour course_detail */
.course-loader-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    /* Fond blanc avec 85% d'opacité */
    background: rgba(255, 255, 255, 0.85) !important; 
    /* Effet de flou sur l'arrière-plan */
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 99999;
    opacity: 1;
    transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

.course-loader-overlay.hidden {
    opacity: 0;
    pointer-events: none;
}

/* Loader circulaire principal */
.circular-loader {
    position: relative;
    width: 80px;
    height: 80px;
}

.loader-ring {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 3px solid transparent;
    /* Vert Cameroun */
    border-top: 3px solid #34c759;
    border-right: 3px solid #34c759;
    animation: spin 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
}

.loader-ring:nth-child(2) {
    width: 60px;
    height: 60px;
    top: 10px;
    left: 10px;
    /* Rouge Cameroun */
    border-top: 3px solid #ff3b30;
    border-right: 3px solid #ff3b30;
    animation: spin 2s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite reverse;
}

.loader-ring:nth-child(3) {
    width: 40px;
    height: 40px;
    top: 20px;
    left: 20px;
    /* Jaune Cameroun */
    border-top: 3px solid #ffcc00;
    border-right: 3px solid #ffcc00;
    animation: spin 1.2s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
}

/* Centre pulsé */
.loader-center {
    position: absolute;
    width: 20px;
    height: 20px;
    top: 30px;
    left: 30px;
    background: linear-gradient(135deg, #ff3b30, #ffcc00);
    border-radius: 50%;
    animation: pulse 1.5s ease-in-out infinite;
}

/* Particules */
.loader-particle {
    position: absolute;
    width: 6px;
    height: 6px;
    background: #ff3b30;
    border-radius: 50%;
    opacity: 0;
}

.loader-particle:nth-child(5) { animation: float-up 3s ease-in-out infinite; }
.loader-particle:nth-child(6) { animation: float-up 3s ease-in-out infinite 0.5s; }
.loader-particle:nth-child(7) { animation: float-up 3s ease-in-out infinite 1s; }
.loader-particle:nth-child(8) { animation: float-up 3s ease-in-out infinite 1.5s; }

/* Texte */
.loader-text {
    position: absolute;
    bottom: -40px;
    left: 50%;
    transform: translateX(-50%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: #333333;
    letter-spacing: 0.5px;
}

/* Animations */
@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

@keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.3); opacity: 0.7; }
}

@keyframes float-up {
    0% { transform: translateY(0) scale(0); opacity: 0; }
    20% { transform: translateY(-20px) scale(1); opacity: 1; }
    80% { transform: translateY(-60px) scale(1); opacity: 0.3; }
    100% { transform: translateY(-80px) scale(0); opacity: 0; }
}

/* Force le style clair même si le téléphone est en mode sombre */
@media (prefers-color-scheme: dark) {
    .course-loader-overlay {
        background: rgba(255, 255, 255, 0.85) !important;
    }
    .loader-text {
        color: #333333;
    }
}
</style>

<div class="course-loader-overlay" id="courseLoader">
    <div class="circular-loader">
        <div class="loader-ring"></div>
        <div class="loader-ring"></div>
        <div class="loader-ring"></div>
        <div class="loader-center"></div>
        <div class="loader-particle" style="top: 10px; left: 40px;"></div>
        <div class="loader-particle" style="top: 40px; right: 10px;"></div>
        <div class="loader-particle" style="bottom: 10px; left: 40px;"></div>
        <div class="loader-particle" style="top: 40px; left: 10px;"></div>
        <div class="loader-text">PEACE...</div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const loader = document.getElementById('courseLoader');
    
    window.addEventListener('load', function() {
        setTimeout(function() {
            if (loader) {
                loader.classList.add('hidden');
                setTimeout(function() {
                    if (loader.parentNode) {
                        loader.parentNode.removeChild(loader);
                    }
                }, 600);
            }
        }, 800);
    });
});

window.showCourseLoader = function() {
    const loader = document.getElementById('courseLoader');
    if (loader) {
        loader.classList.remove('hidden');
        loader.style.display = 'flex';
    }
};

window.hideCourseLoader = function() {
    const loader = document.getElementById('courseLoader');
    if (loader) {
        loader.classList.add('hidden');
        setTimeout(function() {
            if (loader.parentNode) {
                loader.parentNode.removeChild(loader);
            }
        }, 600);
    }
};
</script>
