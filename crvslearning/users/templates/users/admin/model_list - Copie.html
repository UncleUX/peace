<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Overseas Medical Testing – HUD Dashboard</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: radial-gradient(circle at center, #061b1f 0%, #02080a 70%);
    color: #7fffd4;
    font-family: "Segoe UI", Arial, sans-serif;
}

.hud-panel {
    border: 1px solid #0ff;
    box-shadow: 0 0 15px rgba(0,255,255,0.25);
    padding: 15px;
    margin-bottom: 15px;
    background: rgba(0,30,30,0.35);
}

.hud-title {
    text-transform: uppercase;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 1px;
    border-bottom: 1px solid rgba(0,255,255,0.4);
    margin-bottom: 10px;
    padding-bottom: 5px;
}

.value {
    font-size: 28px;
    font-weight: 700;
    color: #00ffcc;
}

.sub {
    font-size: 12px;
    color: #66cccc;
}

.progress {
    height: 8px;
    background-color: #022;
}

.progress-bar {
    background-color: #00ffcc;
}

.bar {
    height: 80px;
    width: 12px;
    background: linear-gradient(to top, #00ffcc, #007f7f);
    margin-right: 8px;
}

.line {
    height: 2px;
    background: #00ffcc;
    margin: 6px 0;
    width: 100%;
}

.globe {
    width: 100%;
    height: 560px;
    background:
        radial-gradient(circle at 30% 30%, rgba(0,255,255,0.35), transparent 40%),
        radial-gradient(circle at center, #003333 0%, #001111 70%);
    border: 1px solid #00ffff;
    box-shadow: 0 0 30px rgba(0,255,255,0.4);
    position: relative;
}

.globe::after {
    content: "";
    position: absolute;
    inset: 10%;
    border-radius: 50%;
    border: 1px dashed rgba(0,255,255,0.4);
}
</style>
</head>

<body>

<div class="container-fluid py-3">

    <h4 class="text-center mb-4" style="letter-spacing:2px;">
        OVERSEAS MEDICAL TESTING
    </h4>

    <div class="row">

        <!-- LEFT COLUMN -->
        <div class="col-md-3">

            <div class="hud-panel">
                <div class="hud-title">Overview</div>
                <div class="value">42.6 <span class="sub">million</span></div>
                <div class="sub">Total Sales</div>
                <div class="line"></div>
                <div class="value">36.8 <span class="sub">million</span></div>
                <div class="sub">Investment</div>
            </div>

            <div class="hud-panel">
                <div class="hud-title">Sales Volume</div>
                <div class="line"></div>
                <div class="line" style="width:80%"></div>
                <div class="line" style="width:60%"></div>
                <div class="line" style="width:90%"></div>
            </div>

        </div>

        <!-- CENTER -->
        <div class="col-md-6 text-center">

            <div class="hud-panel">
                <div class="hud-title">Global Distribution</div>
                <div class="globe"></div>
            </div>

            <div class="hud-panel">
                <div class="hud-title">Investment Breakdown</div>
                <div class="d-flex justify-content-center align-items-end">
                    <div class="bar"></div>
                    <div class="bar" style="height:120px"></div>
                    <div class="bar" style="height:60px"></div>
                    <div class="bar" style="height:100px"></div>
                </div>
            </div>

        </div>

        <!-- RIGHT COLUMN -->
        <div class="col-md-3">

            <div class="hud-panel">
                <div class="hud-title">Trend</div>
                <div class="sub">USA</div>
                <div class="progress mb-2">
                    <div class="progress-bar" style="width:70%"></div>
                </div>
                <div class="sub">Japan</div>
                <div class="progress mb-2">
                    <div class="progress-bar" style="width:55%"></div>
                </div>
                <div class="sub">Germany</div>
                <div class="progress">
                    <div class="progress-bar" style="width:40%"></div>
                </div>
            </div>

            <div class="hud-panel">
                <div class="hud-title">Industry</div>
                <div class="sub">Medical Devices – 42%</div>
                <div class="sub">Software – 31%</div>
                <div class="sub">Research – 27%</div>
            </div>

        </div>

    </div>
</div>

</body>
</html>
