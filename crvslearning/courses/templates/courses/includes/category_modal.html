<!-- Modal pour l'ajout de catégorie -->
<div class="modal fade" id="category-modal" tabindex="-1" aria-labelledby="categoryModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="categoryModalLabel">Ajouter une catégorie</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fermer"></button>
            </div>
            <form id="category-form" method="post" action="{% url 'courses:create_category' %}">
                {% csrf_token %}
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="id_name" class="form-label">
                            Nom de la catégorie <span class="text-danger">*</span>
                        </label>
                        <input type="text" name="name" class="form-control" id="id_name" required
                               maxlength="100" placeholder="Entrez le nom de la catégorie">
                        <div class="form-text">Le nom de la catégorie doit être unique (100 caractères max).</div>
                        <div class="invalid-feedback"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save me-1"></i> Enregistrer
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
