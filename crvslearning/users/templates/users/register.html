{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer votre compte - PEACE Crvs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --bg-color: #0b0114; --accent: #6d28d9; --text-main: #ffffff; --text-muted: #94a3b8; }
        body { font-family: 'Inter', sans-serif; margin: 0; min-height: 100vh; background: url("{% static 'img/bg-profil.png' %}") center/cover no-repeat, var(--bg-color); display: flex; justify-content: center; align-items: center; padding: 20px; }
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(11, 1, 20, 0.85); z-index: 0; }
        .register-container { width: 100%; max-width: 600px; z-index: 2; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); padding: 40px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        .form-section { display: none; }
        .form-section.active { display: block; }
        .form-group { margin-bottom: 20px; }
        label { color: var(--text-muted); font-size: 13px; margin-bottom: 8px; display: block; }
        .form-control { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 12px; border-radius: 12px; color: white; box-sizing: border-box; }
        .form-control:focus { border-color: var(--accent); outline: none; background: rgba(109, 40, 217, 0.1); }
        .btn { padding: 12px 20px; border-radius: 12px; border: none; cursor: pointer; font-weight: 600; text-decoration: none; display: inline-block; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: white; }
        .required-star { color: #ef4444; }
        .password-input-wrapper { position: relative; }
        .password-toggle { position: absolute; right: 15px; top: 12px; background: none; border: none; color: var(--text-muted); cursor: pointer; }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <div class="register-container">
        <form method="post" action="{% url 'users:register' %}" id="registerForm" novalidate>
            {% csrf_token %}
            
            <div class="form-section active">
                <h3>Informations personnelles</h3>
                <div class="form-group"><label>Prénom <span class="required-star">*</span></label><input type="text" name="first_name" class="form-control" required></div>
                <div class="form-group"><label>Nom <span class="required-star">*</span></label><input type="text" name="last_name" class="form-control" required></div>
                <div class="form-group"><label>Date de naissance <span class="required-star">*</span></label><input type="date" name="date_of_birth" class="form-control" required></div>
                <div class="form-group"><label>Email <span class="required-star">*</span></label><input type="email" name="email" class="form-control" required></div>
            </div>

            <div class="form-section">
                <h3>Structure professionnelle</h3>
                <div class="form-group"><label>Nom d'utilisateur</label><input type="text" name="username" class="form-control" readonly></div>
                <div class="form-group"><label>Votre structure <span class="required-star">*</span></label>
                    <select name="structure" id="id_structure" class="form-control" onchange="handleStructureChange(this.value)">
                        <option value="">Sélectionnez...</option>
                        <option value="bunec">BUNEC</option>
                        <option value="commune">Commune</option>
                        <option value="minsante">Ministère de la Santé</option>
                        <option value="universite">Université</option>
                    </select>
                </div>
                <div id="bunec-container" style="display:none;" class="conditional-fields">
                    <div class="form-group"><label>Structure BUNEC</label><select name="bunec_structure" class="form-control"><option value="direction_generale">Direction Générale</option><option value="agence_regionale">Agence Régionale</option></select></div>
                </div>
                <div id="commune-container" style="display:none;" class="conditional-fields">
                    <div class="form-group"><label>Nom de la commune</label><input type="text" name="commune" class="form-control"></div>
                    <div class="form-group"><label>Fonction</label><select name="fonction" class="form-control"><option value="secretaire">Secrétaire</option><option value="officier">Officier</option></select></div>
                </div>
            </div>

            <div class="form-section">
                <h3>Sécurité du compte</h3>
                <div class="form-group"><label>Mot de passe <span class="required-star">*</span></label><input type="password" name="password1" class="form-control" required></div>
                <div class="form-group"><label>Confirmation <span class="required-star">*</span></label><input type="password" name="password2" class="form-control" required></div>
                <button type="submit" class="btn btn-primary" style="width:100%">CRÉER MON COMPTE</button>
            </div>
        </form>

        <div style="display:flex; justify-content:space-between; margin-top:20px;">
            <button id="prevBtn" class="btn btn-secondary" onclick="changeStep(-1)" disabled>Retour</button>
            <button id="nextBtn" class="btn btn-primary" onclick="changeStep(1)">Suivant</button>
        </div>
    </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Progress bar update
      function updateProgress() {
        const firstName = document.getElementById('id_first_name').value;
        const lastName = document.getElementById('id_last_name').value;
        const email = document.getElementById('id_email').value;
        const structure = document.getElementById('id_structure').value;
        const password1 = document.getElementById('id_password1').value;
        const password2 = document.getElementById('id_password2').value;
        
        const steps = document.querySelectorAll('.progress-step');
        
        // Step 1: Personal info
        if (firstName && lastName && email) {
          steps[0].classList.add('completed');
          steps[0].classList.remove('active');
        } else {
          steps[0].classList.add('active');
          steps[0].classList.remove('completed');
        }
        
        // Step 2: Structure
        if (structure) {
          steps[1].classList.add('completed');
          steps[1].classList.remove('active');
        } else {
          steps[1].classList.add('active');
          steps[1].classList.remove('completed');
        }
        
        // Step 3: Security
        if (password1 && password2) {
          steps[2].classList.add('completed');
          steps[2].classList.remove('active');
        } else {
          steps[2].classList.add('active');
          steps[2].classList.remove('completed');
        }
      }
      
      // Password strength indicator
      function checkPasswordStrength(password) {
        const strengthBar = document.getElementById('passwordStrength');
        let strength = 0;
        
        if (password.length >= 8) strength++;
        if (password.match(/[a-z]+/)) strength++;
        if (password.match(/[A-Z]+/)) strength++;
        if (password.match(/[0-9]+/)) strength++;
        if (password.match(/[$@#&!]+/)) strength++;
        
        strengthBar.className = 'password-strength-bar';
        
        if (strength <= 2) {
          strengthBar.classList.add('weak');
        } else if (strength <= 3) {
          strengthBar.classList.add('medium');
        } else {
          strengthBar.classList.add('strong');
        }
      }
      
      // Toggle conditional fields
      function toggleFields() {
        const structure = document.getElementById('id_structure');
        const containers = {
          bunec: document.getElementById('bunec-container'),
          service: document.getElementById('service-container'),
          commune: document.getElementById('commune-container'),
          universite: document.getElementById('universite-container'),
          santeType: document.getElementById('sante-type-container'),
          santeService: document.getElementById('sante-service-container'),
          fosaProfession: document.getElementById('fosa-profession-container')
        };
        
        // Hide all containers
        Object.values(containers).forEach(container => {
          if (container) container.style.display = 'none';
        });
        
        // Reset required fields
        const inputs = document.querySelectorAll('.conditional-fields input, .conditional-fields select');
        inputs.forEach(input => input.required = false);
        
        // Show relevant container
        if (structure) {
          const selectedStructure = structure.value;
          
          switch(selectedStructure) {
            case 'bunec':
              if (containers.bunec) {
                containers.bunec.style.display = 'block';
                containers.bunec.querySelectorAll('select').forEach(input => input.required = true);
              }
              // Masquer l'ancien champ service
              if (containers.service) {
                containers.service.style.display = 'none';
                containers.service.querySelector('input').required = false;
              }
              break;
            case 'commune':
              if (containers.commune) {
                containers.commune.style.display = 'block';
                containers.commune.querySelectorAll('input, select').forEach(input => input.required = true);
              }
              break;
            case 'universite':
              if (containers.universite) {
                containers.universite.style.display = 'block';
                containers.universite.querySelector('select').required = true;
              }
              break;
            case 'minsante':
              if (containers.santeType) {
                containers.santeType.style.display = 'block';
                containers.santeType.querySelector('select').required = true;
                toggleSanteFields();
              }
              break;
          }
        }
        
        updateProgress();
      }
      
      // Toggle health ministry fields
      function toggleSanteFields() {
        const santeType = document.getElementById('id_sante_type');
        const santeService = document.getElementById('sante-service-container');
        const fosaProfession = document.getElementById('fosa-profession-container');
        
        // Hide both containers
        if (santeService) santeService.style.display = 'none';
        if (fosaProfession) fosaProfession.style.display = 'none';
        
        // Reset required fields
        if (santeService) santeService.querySelector('input').required = false;
        if (fosaProfession) fosaProfession.querySelector('select').required = false;
        
        // Show relevant container
        if (santeType) {
          const selectedType = santeType.value;
          
          if (selectedType === 'admin_centrale' && santeService) {
            santeService.style.display = 'block';
            santeService.querySelector('input').required = true;
          } else if (selectedType === 'fosa' && fosaProfession) {
            fosaProfession.style.display = 'block';
            fosaProfession.querySelector('select').required = true;
          }
        }
      }
      
      // Toggle BUNEC service fields based on structure selection
      function toggleBunecServiceFields() {
        const bunecStructure = document.getElementById('bunec_structure_select');
        const bunecServiceContainer = document.getElementById('bunec_service_container');
        const bunecServiceSelect = document.getElementById('bunec_service_select');
        
        if (!bunecStructure || !bunecServiceContainer || !bunecServiceSelect) return;
        
        // Hide service container initially
        bunecServiceContainer.style.display = 'none';
        bunecServiceSelect.required = false;
        
        // Clear existing options
        bunecServiceSelect.innerHTML = '<option value="" disabled selected>Sélectionnez votre service</option>';
        
        const selectedStructure = bunecStructure.value;
        
        if (selectedStructure === 'direction_generale') {
          // Services pour Direction Générale
          const services = [
            { value: 'cabinet_dg', text: 'Cabinet DG' },
            { value: 'das', text: 'DAS' },
            { value: 'daf', text: 'DAF' },
            { value: 'dsi', text: 'DSI' },
            { value: 'dncc', text: 'DNCC' },
            { value: 'cfs', text: 'CFS' },
            { value: 'cajc', text: 'CAJC' },
            { value: 'dac', text: 'DAC' },
            { value: 'courrier', text: 'COURRIER' },
            { value: 'cppc', text: 'CPPC' },
            { value: 'autres', text: 'AUTRES' }
          ];
          
          services.forEach(service => {
            const option = document.createElement('option');
            option.value = service.value;
            option.textContent = service.text;
            bunecServiceSelect.appendChild(option);
          });
          
          // Show service container
          bunecServiceContainer.style.display = 'block';
          bunecServiceSelect.required = true;
          
        } else if (selectedStructure === 'agence_regionale') {
          // Services pour Agence Régionale
          const services = [
            { value: 'service_suivi_cec', text: 'Service du suivi et des CEC' },
            { value: 'service_formation_sensibilisation', text: 'Service de la formation et de la sensibilisation' },
            { value: 'service_informatique_fichier_statistiques', text: 'Service informatique du fichier et des statistiques' },
            { value: 'autres', text: 'Autres' }
          ];
          
          services.forEach(service => {
            const option = document.createElement('option');
            option.value = service.value;
            option.textContent = service.text;
            bunecServiceSelect.appendChild(option);
          });
          
          // Show service container
          bunecServiceContainer.style.display = 'block';
          bunecServiceSelect.required = true;
        }
      }
      
      // Auto-generate username
      function updateUsername() {
        const firstName = document.getElementById('id_first_name').value.trim().toLowerCase();
        const lastName = document.getElementById('id_last_name').value.trim().toLowerCase();
        const username = document.getElementById('id_username');
        
        if (firstName && lastName && username) {
          const generatedUsername = firstName + '.' + lastName;
          if (!username.value || username.value === generatedUsername) {
            username.value = generatedUsername;
          }
        }
      }
      
      // Enable manual username edit
      function enableManualUsernameEdit() {
        const username = document.getElementById('id_username');
        if (username) {
          username.readOnly = false;
          username.placeholder = "Modifiable manuellement ou généré automatiquement";
        }
      }
      
      // Form validation
      function validateForm() {
        const password1 = document.getElementById('id_password1').value;
        const password2 = document.getElementById('id_password2').value;
        const structure = document.getElementById('id_structure').value;
        const service = document.getElementById('id_service').value;
        const commune = document.getElementById('id_commune').value;
        
        // Check password match
        if (password1 && password2 && password1 !== password2) {
          Swal.fire({
            title: 'Erreur',
            text: 'Les mots de passe ne correspondent pas',
            icon: 'error',
            confirmButtonColor: '#d13438',
            confirmButtonText: 'OK'
          });
          return false;
        }
        
        // Check required conditional fields
        if (structure === 'bunec') {
          const bunecStructure = document.getElementById('bunec_structure_select').value;
          const bunecService = document.getElementById('bunec_service_select').value;
          
          if (!bunecStructure) {
            Swal.fire({
              title: 'Champ requis',
              text: 'Veuillez sélectionner votre structure BUNEC',
              icon: 'error',
              confirmButtonColor: '#d13438',
              confirmButtonText: 'OK'
            });
            return false;
          }
          
          if (!bunecService) {
            Swal.fire({
              title: 'Champ requis',
              text: 'Veuillez sélectionner votre service BUNEC',
              icon: 'error',
              confirmButtonColor: '#d13438',
              confirmButtonText: 'OK'
            });
            return false;
          }
        }
        
        if (structure === 'commune' && !commune) {
          Swal.fire({
            title: 'Champ requis',
            text: 'Veuillez entrer le nom de votre commune',
            icon: 'error',
            confirmButtonColor: '#d13438',
            confirmButtonText: 'OK'
          });
          return false;
        }
        
        return true;
      }
      
      // Event listeners
      const structureSelect = document.getElementById('id_structure');
      if (structureSelect) {
        structureSelect.addEventListener('change', toggleFields);
      }
      
      const santeTypeSelect = document.getElementById('id_sante_type');
      if (santeTypeSelect) {
        santeTypeSelect.addEventListener('change', toggleSanteFields);
      }
      
      // Event listener pour BUNEC structure
      const bunecStructureSelect = document.getElementById('bunec_structure_select');
      if (bunecStructureSelect) {
        bunecStructureSelect.addEventListener('change', toggleBunecServiceFields);
      }
      
      // Username generation
      ['input', 'blur'].forEach(event => {
        document.getElementById('id_first_name')?.addEventListener(event, updateUsername);
        document.getElementById('id_last_name')?.addEventListener(event, updateUsername);
      });
      
      document.getElementById('id_username')?.addEventListener('focus', enableManualUsernameEdit);
      
      // Password strength
      document.getElementById('id_password1')?.addEventListener('input', (e) => {
        checkPasswordStrength(e.target.value);
        updateProgress();
      });
      
      document.getElementById('id_password2')?.addEventListener('input', updateProgress);
      
      // Progress update on all inputs
      document.querySelectorAll('.form-control').forEach(input => {
        input.addEventListener('input', updateProgress);
        input.addEventListener('blur', updateProgress);
      });
      
      // Form submission
      const registerForm = document.getElementById('registerForm');
      if (registerForm) {
        registerForm.addEventListener('submit', function(e) {
          if (!validateForm()) {
            e.preventDefault();
            return;
          }
          
          const submitBtn = document.getElementById('submitBtn');
          if (submitBtn) {
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Création du compte...';
          }
        });
      }
      
      // Display messages
      const messages = document.querySelectorAll('.message');
      messages.forEach(message => {
        const type = message.getAttribute('data-type') || 'info';
        const icon = type === 'error' ? 'error' : 'success';
        
        Swal.fire({
          title: type === 'error' ? 'Erreur' : 'Information',
          html: message.textContent,
          icon: icon,
          confirmButtonColor: type === 'error' ? '#d13438' : '#107c10',
          confirmButtonText: 'OK',
          allowOutsideClick: false
        });
      });
      
      // Initialize
      toggleFields();
      updateProgress();
      
      // Password validation
      const password1 = document.getElementById('id_password1');
      const password2 = document.getElementById('id_password2');
      
      function validatePassword() {
        if (password1 && password2 && password1.value !== password2.value) {
          password2.setCustomValidity("Les mots de passe ne correspondent pas");
        } else if (password2) {
          password2.setCustomValidity('');
        }
      }
      
      // Password validation listeners
      if (password1) {
        password1.addEventListener('input', validatePassword);
      }
      if (password2) {
        password2.addEventListener('input', validatePassword);
      }
    });

    // Toggle password visibility
    function togglePasswordVisibility(fieldId) {
      const passwordField = document.getElementById(fieldId);
      const toggleButton = passwordField.nextElementSibling;
      const icon = toggleButton.querySelector('i');
      
      if (passwordField.type === 'password') {
        passwordField.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
        toggleButton.title = 'Masquer le mot de passe';
      } else {
        passwordField.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
        toggleButton.title = 'Afficher le mot de passe';
      }
    }

    // Date picker toggle (simple year input for older dates)
    function toggleDatePicker() {
      const dateInput = document.getElementById('id_date_of_birth');
      
      // If input is already focused, show year picker
      if (document.activeElement === dateInput) {
        // Create simple year picker
        showYearPicker(dateInput);
      } else {
        // Focus the date input
        dateInput.focus();
      }
    }

    function showYearPicker(dateInput) {
      // Create a simple year selector for easier navigation
      const currentYear = new Date().getFullYear();
      const minYear = 1900;
      const maxYear = currentYear - 16; // Minimum age 16
      
      // Create year dropdown
      const yearSelect = document.createElement('select');
      yearSelect.style.position = 'absolute';
      yearSelect.style.top = '100%';
      yearSelect.style.left = '0';
      yearSelect.style.zIndex = '1000';
      yearSelect.style.background = 'white';
      yearSelect.style.border = '2px solid #0078d4';
      yearSelect.style.borderRadius = '8px';
      yearSelect.style.padding = '8px';
      yearSelect.style.marginTop = '4px';
      yearSelect.style.fontSize = '16px';
      
      // Add years in reverse order (newest first)
      for (let year = maxYear; year >= minYear; year--) {
        const option = document.createElement('option');
        option.value = year;
        option.textContent = year;
        yearSelect.appendChild(option);
      }
      
      // Add close handler
      yearSelect.addEventListener('change', function() {
        const selectedYear = this.value;
        const currentDate = dateInput.value || '2000-01-01';
        const [year, month, day] = currentDate.split('-');
        dateInput.value = `${selectedYear}-${month || '01'}-${day || '01'}`;
        document.body.removeChild(yearSelect);
      });
      
      yearSelect.addEventListener('blur', function() {
        setTimeout(() => {
          if (document.body.contains(yearSelect)) {
            document.body.removeChild(yearSelect);
          }
        }, 200);
      });
      
      // Add to DOM and focus
      document.body.appendChild(yearSelect);
      yearSelect.focus();
    }
  </script>
  <script>
    // Variables nécessaires au fonctionnement de la navigation
    let currentStep = 0; // Définit la page de départ

    /**
     * Fonction de navigation par étapes (Next/Prev)
     * @param {number} n - 1 pour avancer, -1 pour reculer
     */
    function changeStep(n) {
        const sections = document.querySelectorAll(".form-section");
        
        // 1. Validation : Vérifier les champs obligatoires avant d'avancer
        if (n === 1) {
            const currentInputs = sections[currentStep].querySelectorAll('input[required], select[required]');
            for (let input of currentInputs) {
                if (!input.value.trim()) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Champs manquants',
                        text: 'Veuillez remplir tous les champs obligatoires.',
                        confirmButtonColor: '#d13438'
                    });
                    input.focus();
                    return false; // Stoppe la navigation
                }
            }
        }

        // 2. Masquer la section actuelle
        sections[currentStep].classList.remove("active");
        
        // 3. Incrémenter l'index
        currentStep += n;
        
        // 4. Afficher la nouvelle section
        sections[currentStep].classList.add("active");
        
        // 5. Mise à jour de l'état des boutons
        const prevBtn = document.getElementById("prevBtn");
        const nextBtn = document.getElementById("nextBtn");
        
        if (prevBtn) prevBtn.disabled = (currentStep === 0);
        if (nextBtn) nextBtn.style.display = (currentStep === sections.length - 1) ? "none" : "block";
    }
</script>
</body>
</html>
