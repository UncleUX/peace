{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<style>
.forum-header {
    height: 100px;
    width: 100%;
    background-image: url('{% static 'img/scrub.jpg' %}');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    position: relative;
    margin-bottom: 30px;
}

.forum-header-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    display: flex;
    align-items: center;
    justify-content: flex-start;
    padding-left: 30px;
}

.forum-header-content {
    text-align: left;
    color: white;
    z-index: 2;
}

.forum-title {
    font-size: 2.5rem;
    font-weight: bold;
    margin: 0;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
}

.forum-subtitle {
    font-size: 1.1rem;
    margin: 10px 0 0 0;
    opacity: 0.9;
    text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.7);
}
@media (max-width: 768px) {
    .forum-header{
        display: none !important;
    }
}
</style>
{% endblock %}

{% block content %}
<!-- Header Forum -->
<div class="forum-header">
    <div class="forum-header-overlay">
        <div class="forum-header-content">
            <h1 class="forum-title">
                <i class="bi bi-chat-dots me-3"></i>
                Forum CRVS Learning
            </h1>
            <p class="forum-subtitle">
                Espace d'échange et de partage de connaissances
            </p>
        </div>
    </div>
</div>

<div class="container-fluid px-2 py-3">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-header bg-transparent border-0 pt-3 pb-0">
                    <h5 class="fw-bold mb-0 text-primary"><i class="bi bi-plus-circle me-1"></i> Nouvelle question</h5>
                </div>
                <div class="card-body p-3">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-2">
                            <label class="form-label small fw-bold mb-1">Titre *</label>
                            <input type="text" name="title" class="form-control form-control-sm" value="{{ form.title.value|default:'' }}" required>
                        </div>
                        
                        <div class="mb-2">
                            <label class="form-label small fw-bold mb-1">Description *</label>
                            <textarea name="content" class="form-control form-control-sm" rows="4" required>{{ form.content.value|default:'' }}</textarea>
                        </div>
                        
                        <div class="row g-2">
                            <div class="col-6 mb-2">
                                <label class="form-label small fw-bold mb-1">Catégorie</label>
                                <select name="category" class="form-select form-select-sm">
                                    <option value="">-- Sélectionner --</option>
                                    {% for category in form.category.queryset %}
                                        <option value="{{ category.id }}" {% if form.category.value == category.id|stringformat:"s" %}selected{% endif %}>{{ category.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-6 mb-2">
                                <label class="form-label small fw-bold mb-1">Cours</label>
                                <select name="course" class="form-select form-select-sm">
                                    <option value="">-- Sélectionner --</option>
                                    {% for course in form.course.queryset %}
                                        <option value="{{ course.id }}" {% if form.course.value == course.id|stringformat:"s" %}selected{% endif %}>{{ course.title }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label small fw-bold mb-1">Tags (séparés par virgules)</label>
                            <input type="text" name="tags" class="form-control form-control-sm" value="{{ form.tags.value|default:'' }}">
                        </div>
                        
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-sm btn-primary flex-grow-1 py-2 fw-bold">Publier</button>
                            <a href="{% url 'forum:home' %}" class="btn btn-sm btn-outline-secondary px-3">Annuler</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
