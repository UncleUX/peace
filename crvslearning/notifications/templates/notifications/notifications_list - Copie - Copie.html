<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CRVS System Boot</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
}

body {
    background: radial-gradient(circle at center, #060b14 0%, #020409 70%, #000 100%);
    height: 100vh;
    overflow: hidden;
    color: #bfefff;
}

/* SCREENS */
.screen {
    position: fixed;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

/* ========== LOADER ========== */
#loader {
    z-index: 10;
}

/* Halo */
.halo {
    position: absolute;
    width: 700px;
    height: 700px;
    background: radial-gradient(circle, rgba(100,180,255,0.25), transparent 65%);
    filter: blur(60px);
    animation: haloPulse 4s ease-in-out infinite;
}

/* Core system */
.core-system {
    position: relative;
    width: 260px;
    height: 260px;
}

/* Rings */
.ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2px solid transparent;
    border-top: 2px solid #8fdcff;
    border-right: 2px solid rgba(140,220,255,0.3);
    animation: spin 2.2s linear infinite;
}

.ring:nth-child(2) {
    inset: 20px;
    animation: spinReverse 3.4s linear infinite;
    border-top: 2px solid #bfffff;
}

.ring:nth-child(3) {
    inset: 40px;
    animation: spin 5s linear infinite;
    border-top: 2px solid #ffffff;
    opacity: 0.7;
}

/* Scan */
.scan {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: conic-gradient(from 0deg, rgba(140,220,255,0.0), rgba(140,220,255,0.35), rgba(140,220,255,0.0));
    animation: spin 1.8s linear infinite;
    mix-blend-mode: screen;
}

/* Core */
.core {
    position: absolute;
    inset: 80px;
    border-radius: 50%;
    background: radial-gradient(circle, #ffffff 0%, #8fdcff 45%, #0b2a44 75%);
    box-shadow:
        0 0 30px rgba(140,220,255,1),
        0 0 80px rgba(140,220,255,0.6),
        inset 0 0 25px rgba(255,255,255,0.9);
    animation: corePulse 1.6s ease-in-out infinite;
}

/* Progress bar */
.progress-wrap {
    margin-top: 50px;
    width: 360px;
    height: 6px;
    background: rgba(255,255,255,0.12);
    border-radius: 20px;
    overflow: hidden;
}

.progress-bar {
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, #7cc7ff, #ffffff, #7cc7ff);
    box-shadow: 0 0 15px rgba(140,220,255,0.9);
}

/* Text */
.status {
    margin-top: 18px;
    letter-spacing: 4px;
    font-size: 12px;
    opacity: 0.8;
}

/* ========== SUCCESS ========== */
#success {
    opacity: 0;
    pointer-events: none;
    z-index: 5;
}

.success-circle {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    border: 2px solid #8fdcff;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow:
        0 0 30px rgba(140,220,255,0.8),
        0 0 80px rgba(140,220,255,0.5);
    animation: successPulse 2s ease-in-out infinite;
}

.check {
    font-size: 64px;
    color: white;
    text-shadow: 0 0 20px rgba(140,220,255,1);
}

.success-text {
    margin-top: 30px;
    letter-spacing: 6px;
}

/* ========== APP ========== */
#app {
    display: none;
    padding: 40px;
}

/* ========== ANIMATIONS ========== */
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes spinReverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }

@keyframes corePulse {
    0%,100% { transform: scale(0.85); filter: brightness(1); }
    50% { transform: scale(1); filter: brightness(1.4); }
}

@keyframes haloPulse {
    0%,100% { opacity: 0.4; transform: scale(0.9); }
    50% { opacity: 0.9; transform: scale(1.05); }
}

@keyframes successPulse {
    0%,100% { transform: scale(0.95); }
    50% { transform: scale(1.05); }
}

/* Fade transitions */
.fade-out {
    animation: fadeOut 0.8s ease forwards;
}

.fade-in {
    animation: fadeIn 0.8s ease forwards;
}

@keyframes fadeOut {
    to { opacity: 0; transform: scale(1.05); }
}

@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.95); }
    to   { opacity: 1; transform: scale(1); }
}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader" class="screen">
    <div class="halo"></div>

    <div class="core-system">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="scan"></div>
        <div class="core"></div>
    </div>

    <div class="progress-wrap">
        <div class="progress-bar" id="bar"></div>
    </div>
