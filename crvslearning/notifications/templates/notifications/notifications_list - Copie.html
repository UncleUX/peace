<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CRVSlearning OS Boot</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Consolas, monospace;
}

body {
    background: radial-gradient(circle at center, #050b14 0%, #020409 60%, #000 100%);
    color: #7cfffc;
    height: 100vh;
    overflow: hidden;
}

/* BOOT SCREEN */
#boot {
    position: fixed;
    inset: 0;
    padding: 30px;
    z-index: 9999;
}

/* Terminal */
.terminal {
    max-width: 900px;
    margin: auto;
    font-size: 14px;
    line-height: 1.6;
    text-shadow: 0 0 8px rgba(0,255,255,0.4);
}

.line {
    opacity: 0;
    animation: show 0.1s forwards;
}

@keyframes show {
    to { opacity: 1; }
}

/* Progress bar */
.progress-container {
    margin-top: 30px;
    width: 100%;
    height: 14px;
    border: 1px solid rgba(0, 246, 255, 0.6);
    border-radius: 20px;
    overflow: hidden;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #00f6ff, #7cff00, #00f6ff);
    box-shadow: 0 0 15px #00f6ff;
    transition: width 0.2s ease;
}

/* Fade out */
.fade-out {
    animation: fadeOut 1.2s ease forwards;
}

@keyframes fadeOut {
    to {
        opacity: 0;
        visibility: hidden;
    }
}

/* App */
#app {
    display: none;
    padding: 40px;
}
</style>
</head>
<body>

<!-- BOOT SCREEN -->
<div id="boot">
    <div class="terminal" id="terminal"></div>

    <div class="progress-container">
        <div class="progress-bar" id="bar"></div>
    </div>

    <div style="margin-top:10px;">
        SYSTEM LOAD: <span id="percent">0%</span>
    </div>
</div>

<!-- APP -->
<div id="app">
    <h1>Bienvenue sur CRVSlearning</h1>
    <p>Système prêt.</p>
</div>

<script>
const terminal = document.getElementById("terminal");
const bar = document.getElementById("bar");
const percent = document.getElementById("percent");
const boot = document.getElementById("boot");
const app = document.getElementById("app");

const lines = [
    "CRVSLEARNING OS v4.2.1",
    "Copyright (C) Government Systems",
    "----------------------------------------",
    "[OK] Initialisation du noyau...",
    "[OK] Chargement des modules sécurisés...",
    "[OK] Vérification des registres...",
    "[OK] Initialisation interface graphique...",
    "[OK] Synchronisation des services...",
    "[OK] Connexion aux serveurs...",
    "[OK] Chargement moteur pédagogique...",
    "[OK] Système prêt.",
    "",
    "Lancement de l'interface..."
];

let i = 0;
let progress = 0;

/* Effet écriture terminal */
function printLine() {
    if (i < lines.length) {
        const div = document.createElement("div");
        div.className = "line";
        div.textContent = lines[i];
        terminal.appendChild(div);

        progress += Math.floor(100 / lines.length);
        if (progress > 100) progress = 100;

        bar.style.width = progress + "%";
        percent.textContent = progress + "%";

        i++;
        setTimeout(printLine, 300 + Math.random() * 300);
    } else {
        bar.style.width = "100%";
        percent.textContent = "100%";

        setTimeout(() => {
            boot.classList.add("fade-out");
            setTimeout(() => {
                boot.style.display = "none";
                app.style.display = "block";
            }, 1200);
        }, 800);
    }
}

/* Lancer animation */
printLine();
</script>

</body>
</html>
