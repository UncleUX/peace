{% extends "base.html" %}
{% load static %}

{% block extra_css %}
<style>
.chat-container {
    height: calc(100vh - 200px);
    display: flex;
    flex-direction: column;
}

.chat-sidebar {
    width: 300px;
    border-right: 1px solid #e9ecef;
    background: #f8f9fa;
}

.chat-main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
    background: #fff;
}

.chat-input {
    border-top: 1px solid #e9ecef;
    padding: 1rem;
    background: #f8f9fa;
}

.message {
    margin-bottom: 1rem;
    display: flex;
    align-items: flex-start;
}

.message.own {
    flex-direction: row-reverse;
}

.message-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    margin: 0 0.5rem;
}

.message-content {
    max-width: 70%;
}

.message-bubble {
    background: #e9ecef;
    padding: 0.75rem;
    border-radius: 1rem;
    position: relative;
}

.message.own .message-bubble {
    background: #007bff;
    color: white;
}

.message-info {
    font-size: 0.75rem;
    color: #6c757d;
    margin-top: 0.25rem;
}

.message.own .message-info {
    text-align: right;
}

.attachment {
    margin-top: 0.5rem;
    padding: 0.5rem;
    background: rgba(0,0,0,0.05);
    border-radius: 0.5rem;
}

.attachment img {
    max-width: 200px;
    max-height: 150px;
    border-radius: 0.5rem;
    cursor: pointer;
}

.typing-indicator {
    padding: 0.5rem 1rem;
    font-style: italic;
    color: #6c757d;
}

.online-indicator {
    width: 10px;
    height: 10px;
    background: #28a745;
    border-radius: 50%;
    display: inline-block;
    margin-right: 0.5rem;
}

.room-item {
    padding: 1rem;
    border-bottom: 1px solid #e9ecef;
    cursor: pointer;
    transition: background 0.2s;
}

.room-item:hover {
    background: #e9ecef;
}

.room-item.active {
    background: #007bff;
    color: white;
}

.unread-count {
    background: #dc3545;
    color: white;
    border-radius: 50%;
    padding: 0.25rem 0.5rem;
    font-size: 0.75rem;
    margin-left: auto;
}

.file-upload {
    display: none;
}

.upload-btn {
    cursor: pointer;
    color: #007bff;
}

.upload-btn:hover {
    color: #0056b3;
}

.reply-preview {
    background: #f8f9fa;
    padding: 0.5rem;
    border-left: 3px solid #007bff;
    margin-bottom: 0.5rem;
    font-size: 0.875rem;
}

.emoji-picker {
    position: absolute;
    bottom: 100%;
    right: 0;
    background: white;
    border: 1px solid #e9ecef;
    border-radius: 0.5rem;
    padding: 0.5rem;
    display: none;
    box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.15);
}

.emoji-picker.show {
    display: block;
}

.emoji-btn {
    border: none;
    background: none;
    font-size: 1.25rem;
    cursor: pointer;
    padding: 0.25rem;
    border-radius: 0.25rem;
}

.emoji-btn:hover {
    background: #f8f9fa;
}

@media (max-width: 768px) {
    .chat-sidebar {
        width: 100%;
        position: fixed;
        left: -100%;
        top: 0;
        height: 100vh;
        z-index: 1000;
        transition: left 0.3s;
    }
    
    .chat-sidebar.show {
        left: 0;
    }
    
    .chat-main {
        width: 100%;
    }
    
    .message-content {
        max-width: 85%;
    }
}
</style>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/reconnecting-websocket@1.0.0/dist/reconnecting-websocket.min.js"></script>
{% endblock %}
